<!DOCTYPE html>
<html lang="it">

    <style type="text/css">
        .pm_container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .table-list {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        .label-row {
            display: flex;
            align-items: center;
        }

        .label {
            font-weight: bold;
            margin-right: 10px;
        }

        .secondary-row {
            margin-left: 20px;
        }

        .tertiary-row {
            margin-left: 40px;
        }

        .separated-field {
            display: inline-block;
            margin-right: 5px;
        }

        .pm_container ul {}

        .pm_container ul li {}

        .pm_container .label-row {}
    </style>

    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Author:M.Materni" />
        <title>test</title>
        <link rel="stylesheet" href="less/normalize.css" />
        <script type="text/javascript" src="less/less.js"></script>
    </head>

    <body>
        <div class="pm_container">
            <ul class="table-list">
                <li class="label-row">
                    <span class="label">POS</span>
                    <span class="label">NSD</span>
                    <span class="label">ATTR</span>
                </li>
                <li class="secondary-row">
                    <span class="label">VERB:</span>
                    <ul class="table-list tertiary-row">
                        <li class="label-row">
                            <span class="label">tense:</span>
                            <div class="field-row">
                                <span class="field">Pots</span>
                                <span class="field">Pres</span>
                                <span class="field">Fut</span>
                                <span class="field">Imp</span>
                            </div>
                        </li>
                        <li class="label-row">
                            <span class="label">voice:</span>
                            <div class="field-row">
                                <span class="field">Act</span>
                                <span class="field">Pass</span>
                                <span class="field">Rfl</span>
                            </div>
                        </li>
                    </ul>
                </li>
                <li class="secondary-row">
                    <span class="label">NOM:</span>
                    <ul class="table-list tertiary-row">
                        <li class="label-row">
                            <span class="label">caso:</span>
                            <div class="field-row">
                                <span class="field">Sing.</span>
                                <span class="field">Plur.</span>
                            </div>
                        </li>
                        <li class="label-row">
                            <span class="label">genere:</span>
                            <div class="field-row">
                                <span class="field">Masch.</span>
                                <span class="field">Femm.</span>
                            </div>
                        </li>
                    </ul>
                </li>
                <!-- Altri campi e livelli... -->
            </ul>
        </div>


    </body>

</html>
